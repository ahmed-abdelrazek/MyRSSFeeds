# WinUI 3 (Windows App SDK) packaged desktop app
# Builds MSIX packages per platform for Store upload.
# https://aka.ms/yaml

trigger:
- master

pool:
  vmImage: 'windows-latest'

variables:
  project: 'MyRSSFeeds.WinUI/MyRSSFeeds.WinUI.csproj'
  buildConfiguration: 'Release'
  appxPackageDir: '$(build.artifactStagingDirectory)\AppxPackages\\'

steps:
- task: UseDotNet@2
  displayName: 'Use .NET 10 SDK'
  inputs:
    packageType: 'sdk'
    version: '10.0.x'

- task: DownloadSecureFile@1
  name: signingCert
  displayName: 'Download CA certificate'
  inputs:
    secureFile: 'MyFeeds_TemporaryKey.pfx'

- ${{ each platform in split('x86;x64;ARM64', ';') }}:
  - task: DotNetCoreCLI@2
    displayName: 'Build MSIX (${{ platform }})'
    inputs:
      command: 'build'
      projects: '$(project)'
      arguments: >-
        -c $(buildConfiguration)
        -p:Platform=${{ platform }}
        -p:GenerateAppxPackageOnBuild=true
        -p:AppxPackageDir="$(appxPackageDir)"
        -p:UapAppxPackageBuildMode=StoreUpload
        -p:AppxPackageSigningEnabled=true
        -p:PackageCertificateThumbprint=""
        -p:PackageCertificateKeyFile="$(signingCert.secureFilePath)"

- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifact: drop'
  inputs:
    PathtoPublish: '$(build.artifactstagingdirectory)'
