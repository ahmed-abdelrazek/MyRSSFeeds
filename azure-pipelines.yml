# WinUI 3 (Windows App SDK) packaged desktop app
# Builds one multi-platform MSIX bundle (.msixupload) for Store submission.
# https://aka.ms/yaml

trigger:
- master
- main

pool:
  vmImage: 'windows-latest'

variables:
  project: 'MyRSSFeeds.WinUI/MyRSSFeeds.WinUI.csproj'
  buildConfiguration: 'Release'
  appxBundlePlatforms: 'x86|x64|ARM64'
  appxPackageDir: '$(build.artifactStagingDirectory)\AppxPackages\\'

steps:
- task: UseDotNet@2
  displayName: 'Install .NET 10 SDK'
  inputs:
    packageType: 'sdk'
    version: '10.0.x'

- task: DotNetCoreCLI@2
  displayName: 'Build MSIX bundle ($(appxBundlePlatforms))'
  inputs:
    command: 'build'
    projects: '$(project)'
    arguments: >-
      -c $(buildConfiguration)
      -p:Platform=x64
      -p:AppxBundlePlatforms="$(appxBundlePlatforms)"
      -p:AppxBundle=Always
      -p:GenerateAppxPackageOnBuild=true
      -p:UapAppxPackageBuildMode=StoreUpload
      -p:AppxPackageDir="$(appxPackageDir)"
      -p:AppxPackageSigningEnabled=false
      -p:AppxSymbolPackageEnabled=false

- task: PublishBuildArtifacts@1
  displayName: 'Publish Artifact: drop'
  inputs:
    PathtoPublish: '$(build.artifactstagingdirectory)'
